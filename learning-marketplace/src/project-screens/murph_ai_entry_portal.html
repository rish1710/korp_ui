<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murph AI | Curiosity Starts Here</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --electric-blue: #00E0FF;
            --deep-purple: #7000FF;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: white;
            overflow: hidden;
            min-height: 100vh;
        }

        .ethereal-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 224, 255, 0.15) 0%, rgba(112, 0, 255, 0.05) 50%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/feFilter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .murph-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(2deg); }
        }

        .murph-eye-pulse {
            animation: eyePulse 4s infinite;
        }

        @keyframes eyePulse {
            0%, 100% { opacity: 1; transform: scale(1); filter: brightness(1.2); }
            50% { opacity: 0.7; transform: scale(0.95); filter: brightness(1); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-focus-effect:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 15px rgba(0, 224, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--electric-blue), var(--deep-purple));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(0, 224, 255, 0.4);
        }

        /* Particles */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
        }

        /* OTP Input Style */
        .otp-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .otp-dot.active {
            background: var(--electric-blue);
            box-shadow: 0 0 10px var(--electric-blue);
            transform: scale(1.2);
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ 
    step: 'login', 
    email: '', 
    otp: '', 
    loading: false,
    murphMood: 'neutral',
    init() {
        // Particle generation
        for(let i=0; i<30; i++) {
            this.createParticle();
        }
    },
    createParticle() {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 'px';
        p.style.width = size;
        p.style.height = size;
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animation = `float ${5 + Math.random() * 10}s linear infinite`;
        document.getElementById('particle-container').appendChild(p);
    },
    handleLogin() {
        this.loading = true;
        this.murphMood = 'thinking';
        setTimeout(() => {
            this.loading = false;
            this.step = 'otp';
            this.murphMood = 'happy';
        }, 1500);
    }
}">

    <div class="noise-overlay"></div>
    <div id="particle-container" class="fixed inset-0 pointer-events-none"></div>
    
    <!-- Dynamic Ambient Background -->
    <div class="ethereal-glow top-[-10%] left-[-10%] opacity-40"></div>
    <div class="ethereal-glow bottom-[-10%] right-[-10%] opacity-30" style="background: radial-gradient(circle, var(--deep-purple) 0%, transparent 70%);"></div>

    <main class="relative z-10 flex flex-col md:flex-row h-screen w-full">
        
        <!-- LEFT PANEL: MURPH INTERACTIVE -->
        <div class="hidden md:flex flex-1 flex-col items-center justify-center p-12 relative overflow-hidden border-r border-white/5">
            
            <!-- Murph 3D Character -->
            <div class="relative w-full max-w-lg flex flex-col items-center">
                <div class="murph-float relative z-20">
                    <!-- The Robot Body -->
                    <div class="relative w-64 h-64">
                        <!-- Outer Rings -->
                        <div class="absolute inset-0 border-2 border-dashed border-cyan-500/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
                        <div class="absolute inset-4 border border-purple-500/30 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
                        
                        <!-- Core Sphere -->
                        <div class="absolute inset-12 bg-black rounded-full border border-white/10 shadow-[inset_0_0_40px_rgba(0,224,255,0.2)] flex items-center justify-center overflow-hidden">
                            <!-- Visualizer/Face -->
                            <div class="relative w-full h-full flex items-center justify-center">
                                <!-- Eye Core -->
                                <div class="w-16 h-16 bg-cyan-400 rounded-full blur-[2px] murph-eye-pulse shadow-[0_0_30px_#00E0FF]"></div>
                                <!-- Digital Scanning Line -->
                                <div class="absolute w-full h-1 bg-cyan-400/30 blur-sm animate-[bounce_3s_infinite]"></div>
                            </div>
                        </div>

                        <!-- Floating Bits -->
                        <div class="absolute -top-4 -right-4 w-8 h-8 glass-card rounded-lg flex items-center justify-center border-cyan-500/40">
                            <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></div>
                        </div>
                        <div class="absolute bottom-8 -left-8 w-12 h-12 glass-card rounded-full flex items-center justify-center border-purple-500/40">
                            <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Text Content -->
                <div class="mt-16 text-center space-y-6 max-w-md">
                    <h1 class="text-5xl lg:text-7xl font-black tracking-tighter leading-none text-transparent bg-clip-text bg-gradient-to-b from-white to-white/40">
                        Curiosity <br>starts here.
                    </h1>
                    <p class="text-white/50 text-lg font-light leading-relaxed">
                        Discover live learning sessions and pay only for the time you learn. Guided by Murph, your AI co-pilot.
                    </p>
                </div>
            </div>

            <!-- Footer Quote -->
            <div class="absolute bottom-12 left-12 flex items-center gap-4 text-white/30 text-xs tracking-widest uppercase">
                <span class="w-8 h-[1px] bg-white/20"></span>
                Powered by Murph Intelligence Engine v2.0
            </div>
        </div>

        <!-- RIGHT PANEL: AUTH FLOW -->
        <div class="flex-1 flex flex-col items-center justify-center p-6 sm:p-12 bg-black/40 backdrop-blur-md">
            
            <!-- Mobile Header (Visible only on mobile) -->
            <div class="md:hidden mb-12 flex flex-col items-center">
                 <div class="w-16 h-16 mb-4 relative">
                    <div class="absolute inset-0 bg-cyan-500/20 blur-xl rounded-full"></div>
                    <div class="relative w-full h-full bg-black rounded-full border border-cyan-500/50 flex items-center justify-center">
                        <div class="w-4 h-4 bg-cyan-400 rounded-full murph-eye-pulse"></div>
                    </div>
                 </div>
                 <h2 class="text-3xl font-bold">Murph AI</h2>
            </div>

            <!-- Login Card -->
            <div class="w-full max-w-md" x-cloak>
                <div class="glass-card rounded-[2rem] p-8 sm:p-12 relative overflow-hidden">
                    <!-- Subtle Interior Glow -->
                    <div class="absolute -top-24 -right-24 w-48 h-48 bg-cyan-500/10 blur-[60px]"></div>
                    
                    <!-- Form Header -->
                    <div class="mb-10 text-center md:text-left">
                        <h3 class="text-2xl font-semibold mb-2" x-text="step === 'login' ? 'Welcome back' : 'Verify Identity'"></h3>
                        <p class="text-white/40 text-sm" x-text="step === 'login' ? 'Enter your details to access your dashboard' : 'We sent a code to ' + email"></p>
                    </div>

                    <!-- Step 1: Login / Email -->
                    <div x-show="step === 'login'" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
                        <div class="space-y-6">
                            <button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl bg-white text-black font-semibold hover:bg-white/90 transition-all">
                                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"/></svg>
                                Continue with Google
                            </button>

                            <div class="flex items-center gap-4 py-2">
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                                <span class="text-xs text-white/20 uppercase tracking-widest">Or email</span>
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-xs text-white/40 uppercase tracking-widest font-medium ml-1">Email Address</label>
                                <input 
                                    type="email" 
                                    x-model="email"
                                    placeholder="name@company.com" 
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-white/20 input-focus-effect transition-all"
                                >
                            </div>

                            <button 
                                @click="handleLogin"
                                :disabled="!email.includes('@')"
                                class="w-full btn-primary py-4 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <span x-show="!loading">Send Secret Code</span>
                                <span x-show="loading" class="flex items-center gap-2">
                                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                    Summoning Murph...
                                </span>
                            </button>
                        </div>
                    </div>

                    <!-- Step 2: OTP Flow -->
                    <div x-show="step === 'otp'" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
                        <div class="space-y-8">
                            <div class="flex justify-between items-center px-2">
                                <template x-for="i in 6" :key="i">
                                    <div class="otp-dot" :class="otp.length >= i ? 'active' : ''"></div>
                                </template>
                            </div>
                            
                            <input 
                                type="text" 
                                maxlength="6" 
                                x-model="otp"
                                placeholder="Enter 6-digit code"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-center text-3xl tracking-[1em] font-bold text-cyan-400 input-focus-effect"
                                autofocus
                            >

                            <div class="text-center">
                                <button class="text-sm text-cyan-400/80 hover:text-cyan-300 transition-colors font-medium">
                                    Resend code in 0:45
                                </button>
                            </div>

                            <button 
                                @click="window.location.href='#dashboard'"
                                class="w-full btn-primary py-4 rounded-xl font-bold"
                            >
                                Enter Workspace
                            </button>

                            <button @click="step = 'login'" class="w-full text-white/30 text-sm hover:text-white/60 transition-colors">
                                Use a different email
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Secondary Nav / Links -->
                <div class="mt-8 flex justify-center gap-8 text-white/30 text-xs">
                    <a href="#" class="hover:text-white transition-colors">Security</a>
                    <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
                    <a href="#" class="hover:text-white transition-colors">Help Center</a>
                </div>
            </div>

            <!-- Murph Greeting Bubble (Floats near the card) -->
            <div 
                class="mt-12 max-w-xs p-4 glass-card rounded-2xl rounded-tl-none relative animate-pulse"
                x-show="email.length > 5 || step === 'otp'"
                x-transition
            >
                <p class="text-sm text-white/80 italic">
                    <span x-text="step === 'login' ? '“Curiosity is the first step towards mastery. I\'ll have your workspace ready in a second.”' : '“Check your inbox. I\'ve secured your entry key.”'"></span>
                </p>
                <div class="absolute -left-3 top-0 w-3 h-3 bg-white/10" style="clip-path: polygon(100% 0, 0 0, 100% 100%);"></div>
            </div>
        </div>
    </main>

    <!-- Interactive Layer for Murph (Follow cursor slightly) -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const murph = document.querySelector('.murph-float');
            if(murph) {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                murph.style.transform = `translateX(${x}px) translateY(${y}px)`;
            }
        });
    </script>
</body>
</html>
